<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Food by Putri</title>
    
    <!-- Pustaka (Libraries) --><script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Firebase V9 Modular Imports --><script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, doc, setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Mengekspos fungsi Firebase ke lingkup global agar dapat digunakan dalam script Babel
        window.firebase = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, doc, setLogLevel
        };
    </script>

    <!-- CSS KUSTOM -->
    <style>
    /* --- Smooth basic (safe) --- */
		html {
  		scroll-behavior: smooth; /* anchor link smooth */
  		-webkit-font-smoothing: antialiased;
				}

		/* momentum di iOS / touch */
			html, body {
  				-webkit-overflow-scrolling: touch;
					}

				/* optional: sedikit penghalus visual saat scroll (bisa dihapus) */
			body {
  				/* jangan ubah posisi atau overflow di sini — hanya visual */
  				-webkit-tap-highlight-color: rgba(0,0,0,0);
					}
        body {
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
            background-color: #F8F4E1; /* Krem */
            color: #4A2C2A; /* Cokelat Tua */
        }
        .serif-font {
            font-family: 'Playfair Display', serif;
        }
        .bg-brownies {
            background-color: #D4AF98; 
            background-image: 
                linear-gradient(rgba(248, 244, 225, 0.7), rgba(248, 244, 225, 0.7)),
                url('https://images.unsplash.com/photo-1542178243-bc20204b77f1?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #4A2C2A;
        }
        .glass-nav {
            background: rgba(248, 244, 225, 0.9);
            backdrop-filter: blur(40px);
            border-bottom: 1px solid rgba(74, 44, 42, 0.1);
        }
        .card-bg {
            background-color: #FFF9F2;
            border-color: #EAD7D7;
            color: #4A2C2A;
        }
        .card-bg:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
            border-color: #FFC0CB;
        }
        .text-primary-accent {
            color: #FF69B4; /* Pink Cerah */
        }
        .text-secondary-accent {
            color: #A7D7C5; /* Hijau Muda */
        }
        .btn-primary {
            background-color: #FFC0CB; /* Pink Pudar */
            color: #4A2C2A;
        }
        .btn-primary:hover {
            background-color: #FF69B4;
            color: white;
        }
        .btn-accent {
            background-color: #A7D7C5; /* Hijau Muda */
            color: #4A2C2A;
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
        }
        .form-input-field {
            background-color: #FFF9F2;
            border-color: #EAD7D7;
            color: #4A2C2A;
        }
        .footer-bg {
            background-color: #4A2C2A;
            color: #F8F4E1;
        }
        .loading-ring {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(74, 44, 42, .3);
            border-radius: 50%;
            border-top-color: #4A2C2A;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Animasi Modal */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, memo } = React;
        
        // ===================================================================
        // 1. KONSTANTA DAN DATA PRODUK
        // ===================================================================
        const WHATSAPP_NUMBER = "6285649681417";
        const TESTI_FALLBACK_IMAGE = 'https://placehold.co/100x100/F8F4E1/4A2C2A?text=FOTO+KUE';

        const products = [
            { id: 1, name: "Fudgy Brownies Original", price: 85000, desc: "Brownies cokelat klasik dengan tekstur fudgy, crust renyah, dan rasa cokelat yang intens.", image: "standar.jpg" },
            { id: 2, name: "Fudgy Brownies Mini", price: 45000, desc: "Brownies dengan ukuran mini, tidak mengurangi rasa tapi selalu maksimal rasa cokelatnya.", image: "mini.jpg" },
            { id: 3, name: "Brownies Keju Lumer", price: 60000, desc: "Perpaduan manisnya cokelat fudgy dan gurihnya keju cheddar parut di bagian atas.", image: "https://images.unsplash.com/photo-1574085733277-851d9d856a3a?q=80&w=600&auto=format&fit=crop" },
            { id: 4, name: "Bolu Ketan Hitam Keju Lumer", price: 75000, desc: "Brownies premium dengan topping biskuit karamel Lotus dan selai Biscoff yang lumer.", image: "https://images.unsplash.com/photo-1624353365286-3f8d62daad51?q=80&w=600&auto=format&fit=crop" },
            { id: 5, name: "Bolu Ketan Hitam Mini Keju Lumer", price: 70000, desc: "Brownies dengan warna merah merona, rasa khas red velvet, dan swirl cream cheese yang lembut.", image: "https://images.unsplash.com/photo-1619149651177-b088319f39e3?q=80&w=600&auto=format&fit=crop" },
            { id: 6, name: "Klappertart", price: 68000, desc: "Menggunakan bubuk matcha asli. Wangi teh hijaunya yang unik berpadu sempurna dengan tekstur fudgy.", image: "https://images.unsplash.com/photo-1515037893149-de7f840978e2?q=80&w=600&auto=format&fit=crop" }
        ];

        // ===================================================================
        // 2. UTILITAS DAN ICON
        // ===================================================================

        // Format Rupiah
        const formatRupiah = (val) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(val);

        // Format Waktu
        const formatTimestamp = (timestamp) => {
            if (!timestamp || typeof timestamp.toDate !== 'function') return 'Baru saja';
            const date = timestamp.toDate();
            return date.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
        };
        
        // Komponen Icon
        const Icons = {
            Cart: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>,
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Minus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>,
            Star: ({fill}) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill={fill ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            Image: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.08-3.08A2 2 0 0 0 15 11h-1a2 2 0 0 0-1.2.6l-2.8 2.8A2 2 0 0 1 9 17h-1"/></svg>,
            Loading: () => <div className="loading-ring"></div>,
            // Icons lainnya tetap ada...
            Phone: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
            Instagram: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>,
        };


        // ===================================================================
        // 3. KOMPONEN UTAMA (MODAL & CARD)
        // ===================================================================

        // --- 3.1. Modal Gambar (Zoom) ---
        function ImageModal({ imageUrl, onClose, altText }) {
            if (!imageUrl) return null; 

            // Logic image modal tetap sama
            const [validImageUrl, setValidImageUrl] = useState(imageUrl);
            
            useEffect(() => {
                setValidImageUrl(imageUrl);
                const handleEscape = (event) => { if (event.key === 'Escape') onClose(); };
                document.addEventListener('keydown', handleEscape);
                return () => document.removeEventListener('keydown', handleEscape);
            }, [imageUrl, onClose]);

            return (
                <div 
                    className="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4 animate-fade-in"
                    onClick={onClose}
                >
                    <div 
                        className="relative max-w-4xl w-full max-h-[95vh] bg-white rounded-xl shadow-2xl p-4 md:p-6 animate-zoom-in"
                        onClick={(e) => e.stopPropagation()}
                    >
                        <button 
                            onClick={onClose} 
                            className="absolute -top-3 -right-3 md:top-3 md:right-3 bg-red-600 text-white rounded-full p-2 text-sm z-10 hover:bg-red-700 transition shadow-lg ring-4 ring-white"
                            aria-label="Tutup gambar"
                        >
                            <Icons.X />
                        </button>
                        
                        <img 
                            src={validImageUrl} 
                            alt={altText || "Gambar Diperbesar"} 
                            className="max-w-full max-h-[85vh] w-full object-contain rounded-lg" 
                            onError={() => {setValidImageUrl('https://placehold.co/800x600/6b7280/ffffff?text=Gambar+Gagal+Dimuat');}}
                        />
                        <p className="text-center text-xs md:text-sm text-stone-500 mt-3">{altText || "Gambar Produk"}</p>
                    </div>
                </div>
            );
        }

        // --- 3.2. Card Produk (Memoized) ---
        const ProductCard = memo(function ProductCardComponent({ product, handleAddToCart, handleViewImage }) {
            const [imageUrl, setImageUrl] = useState(product.image);

            // Fallback image handler
            const handleImageError = () => {
                setImageUrl(`https://placehold.co/600x400/D4AF98/4A2C2A?text=${product.name.split(' ').join('+')}`);
            };

            return (
                <div 
                    className={`card-bg rounded-xl overflow-hidden shadow-lg hover:shadow-2xl duration-300 transform hover:-translate-y-1 border`}
                >
                    <img 
                        src={imageUrl} 
                        alt={product.name} 
                        className="w-full h-48 object-cover object-center cursor-pointer transition duration-300 hover:scale-[1.05]"
                        onError={handleImageError}
                        onClick={() => handleViewImage(imageUrl, product.name)}
                    />
                    <div className="p-6">
                        <h3 className="serif-font text-2xl font-bold mb-2 text-4A2C2A">{product.name}</h3>
                        <p className="text-xl font-extrabold text-primary-accent mb-4">
                            {formatRupiah(product.price)}
                        </p>
                        <p className="text-gray-600 text-sm mb-6 line-clamp-3 h-[4.5em]">{product.desc}</p>
                        
                        <button 
                            onClick={() => handleAddToCart(product.id)}
                            className="w-full py-3 rounded-xl font-bold btn-accent shadow-md transition hover:ring-2 ring-primary-accent"
                        >
                            Tambah ke Keranjang
                        </button>
                    </div>
                </div>
            );
        });


        // ===================================================================
        // 4. KOMPONEN FIREBASE (TESTIMONI)
        // ===================================================================

        // --- 4.1. Card Testimoni ---
        const RatingStars = ({ rating }) => {
            const stars = [];
            for (let i = 1; i <= 5; i++) {
                const isFilled = i <= rating;
                stars.push(
                    <Icons.Star 
                        key={i} 
                        fill={isFilled} 
                        className={isFilled ? 'text-amber-500' : 'text-gray-300'}
                    />
                );
            }
            return <div className="flex">{stars}</div>;
        };

        function TestimonialCard({ testimonial, handleViewImage }) {
            const [imageUrl, setImageUrl] = useState(testimonial.imageUrl);

            // Fallback image handler
            const handleImageError = () => {
                setImageUrl(TESTI_FALLBACK_IMAGE);
            };

            return (
                <div className="card-bg p-6 rounded-xl shadow-md border flex flex-col justify-between h-full">
                    <div>
                        <RatingStars rating={testimonial.rating} />
                        <p className="text-4A2C2A italic mt-3 mb-4 text-base line-clamp-5">
                            "{testimonial.comment}"
                        </p>
                    </div>

                    <div className="flex items-end justify-between border-t border-EAD7D7 pt-4">
                        <div className="flex flex-col">
                            <p className="font-bold text-lg text-primary-accent">{testimonial.name}</p>
                            <p className="text-xs text-muted">
                                {formatTimestamp(testimonial.createdAt)}
                            </p>
                            <p className="text-xs text-muted truncate max-w-full">
                                ID: {testimonial.userId?.substring(0, 8)}...
                            </p>
                        </div>
                        {testimonial.imageUrl && (
                            <div className="relative">
                                <img
                                    src={imageUrl}
                                    alt={`Foto dari ${testimonial.name}`}
                                    className="w-16 h-16 object-cover rounded-lg border-2 border-primary-accent cursor-pointer transition hover:opacity-80"
                                    onError={handleImageError}
                                    onClick={() => handleViewImage(testimonial.imageUrl, `Testimoni dari ${testimonial.name}`)}
                                />
                                <button 
                                    onClick={() => handleViewImage(testimonial.imageUrl, `Testimoni dari ${testimonial.name}`)} 
                                    className="absolute inset-0 flex items-center justify-center text-white bg-black/40 rounded-lg opacity-0 hover:opacity-100 transition duration-300"
                                    aria-label="Lihat Foto Testimoni"
                                >
                                    <Icons.Image />
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- 4.2. Formulir Testimoni ---
        function TestimonialForm({ db, userId }) {
            const [name, setName] = useState('');
            const [comment, setComment] = useState('');
            const [imageUrl, setImageUrl] = useState(''); 
            const [rating, setRating] = useState(5);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [message, setMessage] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!db || !name || !comment) {
                    setMessage("Nama dan Testimoni wajib diisi.");
                    return;
                }
                
                setIsSubmitting(true);
                setMessage('');

                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                const collectionPath = `artifacts/${appId}/public/data/testimonials`;
                
                try {
                    await firebase.addDoc(firebase.collection(db, collectionPath), {
                        name: name.trim(),
                        comment: comment.trim(),
                        rating: rating,
                        imageUrl: imageUrl.trim() || null, 
                        createdAt: firebase.serverTimestamp(),
                        userId: userId
                    });

                    // Reset form
                    setName(''); setComment(''); setImageUrl(''); setRating(5);
                    setMessage('Terima kasih! Testimoni Anda berhasil dikirim.');
                } catch (error) {
                    console.error("Error writing document: ", error);
                    setMessage('Gagal mengirim testimoni. Silakan coba lagi.');
                } finally {
                    setIsSubmitting(false);
                    setTimeout(() => setMessage(''), 5000);
                }
            };
            
            const renderStars = (currentRating) => {
                const stars = [];
                for (let i = 1; i <= 5; i++) {
                    stars.push(
                        <button
                            key={i}
                            type="button"
                            onClick={() => setRating(i)}
                            className={`p-1 transition-colors ${i <= currentRating ? 'text-amber-500' : 'text-gray-300 hover:text-amber-400'}`}
                        >
                            <Icons.Star fill={true} />
                        </button>
                    );
                }
                return stars;
            };

            return (
                <div className="mt-8 p-6 card-bg rounded-xl shadow-lg border">
                    <h3 className="text-xl font-bold mb-4 text-primary-accent">Tulis Testimoni Anda</h3>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        {/* Input Rating */}
                        <div>
                            <label className="block text-sm font-medium text-4A2C2A mb-1">Rating:</label>
                            <div className="flex space-x-1">{renderStars(rating)}</div>
                        </div>

                        {/* Input Nama, URL Foto, Komentar tetap sama... */}
                        {/* Nama */}
                        <div>
                            <label htmlFor="name" className="block text-sm font-medium text-4A2C2A mb-1">Nama Anda:</label>
                            <input id="name" type="text" value={name} onChange={(e) => setName(e.target.value)} required disabled={isSubmitting} className="w-full p-3 border rounded-lg transition form-input-field"/>
                        </div>
                        {/* URL Foto */}
                        <div>
                            <label htmlFor="imageUrl" className="block text-sm font-medium text-4A2C2A mb-1 flex items-center gap-1"><Icons.Image /> Foto Brownies (URL opsional):</label>
                            <input id="imageUrl" type="url" value={imageUrl} onChange={(e) => setImageUrl(e.target.value)} placeholder="Paste link foto di sini" disabled={isSubmitting} className="w-full p-3 border rounded-lg transition form-input-field"/>
                            <p className="text-xs text-muted mt-1">Hanya mendukung link langsung ke gambar (.jpg, .png, dll.)</p>
                        </div>
                        {/* Komentar */}
                        <div>
                            <label htmlFor="comment" className="block text-sm font-medium text-4A2C2A mb-1">Testimoni Anda:</label>
                            <textarea id="comment" value={comment} onChange={(e) => setComment(e.target.value)} rows="3" required disabled={isSubmitting} className="w-full p-3 border rounded-lg transition form-input-field"></textarea>
                        </div>
                        
                        {/* Tombol Submit */}
                        <button type="submit" disabled={isSubmitting} className={`w-full py-3 rounded-xl font-bold transition flex items-center justify-center gap-2 ${isSubmitting ? 'bg-gray-400 cursor-not-allowed text-white' : 'btn-accent shadow-lg'}`}>
                            {isSubmitting ? (<><Icons.Loading /> Mengirim...</>) : ('Kirim Testimoni')}
                        </button>
                    </form>
                    {message && (<div className={`mt-3 p-3 rounded-lg text-sm ${message.includes('Gagal') ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>{message}</div>)}
                </div>
            );
        }

        // ===================================================================
        // 5. KOMPONEN LAYOUT
        // ===================================================================

        // --- 5.1. Header Navigasi ---
        function Header({ isMenuOpen, setIsMenuOpen, isCartOpen, setIsCartOpen, cart }) {
            return (
                <header id="top" className="fixed top-0 left-0 w-full z-50 glass-nav shadow-md">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center">
                        <a href="#top" className="text-2xl font-bold serif-font text-primary-accent hover:text-pink-600 transition">Kitchen Food by Putri</a>
                        
                        {/* Desktop Nav */}
                        <nav className="hidden md:flex space-x-8">
                            <a href="#produk" className="text-4A2C2A font-medium hover:text-primary-accent transition">Produk</a>
                            <a href="#testimoni" className="text-4A2C2A font-medium hover:text-primary-accent transition">Testimoni</a>
                            <a href="#kontak" className="text-4A2C2A font-medium hover:text-primary-accent transition">Kontak</a>
                        </nav>

                        {/* Buttons */}
                        <div className="flex items-center space-x-3">
                            <button onClick={() => setIsCartOpen(true)} className="relative p-2 rounded-full btn-primary shadow-sm hover:ring-2 ring-primary-accent transition" aria-label="Keranjang Belanja">
                                <Icons.Cart />
                                {Object.keys(cart).length > 0 && (
                                    <span className="absolute -top-1 -right-1 flex items-center justify-center h-5 w-5 bg-red-500 text-white text-xs font-bold rounded-full">
                                        {Object.keys(cart).length}
                                    </span>
                                )}
                            </button>
                            
                            <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2 rounded-full btn-primary md:hidden shadow-sm hover:ring-2 ring-primary-accent transition" aria-label="Toggle Menu">
                                {isMenuOpen ? <Icons.X /> : <Icons.Menu />}
                            </button>
                        </div>
                    </div>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="md:hidden pb-4 pt-2 border-t border-4A2C2A/10 bg-F8F4E1">
                            <nav className="flex flex-col space-y-2 px-4">
                                <a href="#produk" onClick={() => setIsMenuOpen(false)} className="py-2 text-4A2C2A font-medium hover:text-primary-accent transition">Produk</a>
                                <a href="#testimoni" onClick={() => setIsMenuOpen(false)} className="py-2 text-4A2C2A font-medium hover:text-primary-accent transition">Testimoni</a>
                                <a href="#kontak" onClick={() => setIsMenuOpen(false)} className="py-2 text-4A2C2A font-medium hover:text-primary-accent transition">Kontak</a>
                            </nav>
                        </div>
                    )}
                </header>
            );
        }

        // --- 5.2. Hero Section ---
        function Hero() {
            return (
                <section className="bg-brownies pt-24 pb-16 md:pt-32 md:pb-24 text-center">
                    <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                        <h1 className="text-4xl sm:text-6xl lg:text-7xl font-bold serif-font leading-tight mb-4">
                            Lezatnya <span className="text-primary-accent drop-shadow-md">Fudgy Brownies</span> Otentik
                        </h1>
                        <p className="text-lg md:text-xl mb-8 text-4A2C2A max-w-2xl mx-auto">
                            Dibuat dengan cinta dan bahan baku premium, menghadirkan rasa cokelat yang lumer di setiap gigitan.
                        </p>
                        <a href="#produk" className="inline-flex items-center justify-center px-8 py-3 text-lg font-semibold rounded-full btn-primary shadow-xl transition transform hover:scale-[1.03] hover:shadow-2xl ring-2 ring-primary-accent">
                            Lihat Semua Produk
                            <Icons.ChevronRight />
                        </a>
                    </div>
                </section>
            );
        }

        // --- 5.3. Produk Section ---
        function ProductsSection({ handleAddToCart, handleViewImage }) {
            return (
                <section id="produk" className="py-16 md:py-24 bg-white">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <h2 className="text-4xl md:text-5xl font-bold serif-font text-center mb-4 text-primary-accent">Pilihan Produk Kami</h2>
                        <p className="text-center text-lg text-gray-600 mb-12 max-w-3xl mx-auto">Jelajahi berbagai varian rasa spesial yang kami siapkan. Setiap gigitan adalah kebahagiaan.</p>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {products.map(product => (
                                <ProductCard 
                                    key={product.id} 
                                    product={product} 
                                    handleAddToCart={handleAddToCart}
                                    handleViewImage={handleViewImage}
                                />
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // --- 5.4. Testimoni Section ---
        function TestimonialsSection({ testimonials, loadingTesti, db, userId, handleViewImage }) {
            return (
                <section id="testimoni" className="bg-F8F4E1 py-16 md:py-24">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <h2 className="text-4xl md:text-5xl font-bold serif-font text-center mb-4 text-primary-accent">Apa Kata Pelanggan Kami?</h2>
                        <p className="text-center text-lg text-muted mb-12 max-w-3xl mx-auto">Bukti kelezatan dan kualitas produk Kitchen Food by Putri langsung dari pelanggan setia.</p>

                        {/* Daftar Testimoni */}
                        {loadingTesti && (
                            <div className="flex justify-center items-center py-10">
                                <Icons.Loading />
                                <p className="ml-3 text-muted">Memuat testimoni...</p>
                            </div>
                        )}

                        {!loadingTesti && testimonials.length === 0 && (
                            <p className="text-center text-muted py-10">Belum ada testimoni. Jadilah yang pertama!</p>
                        )}
                        
                        {!loadingTesti && testimonials.length > 0 && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {testimonials.map(t => (
                                    <TestimonialCard key={t.id} testimonial={t} handleViewImage={handleViewImage} />
                                ))}
                            </div>
                        )}
                        
                        {/* Formulir Testimoni */}
                        <TestimonialForm db={db} userId={userId} />
                    </div>
                </section>
            );
        }

        // --- 5.5. Kontak dan Footer ---
        function ContactFooter({ userId }) {
            return (
                <footer id="kontak" className="footer-bg pt-12 pb-8">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 border-b border-white/20 pb-8 mb-8">
                            <div>
                                <h3 className="text-xl font-bold serif-font text-secondary-accent mb-4">Kitchen Food</h3>
                                <p className="text-sm text-F8F4E1/80">Menyediakan fudgy brownies terbaik, dibuat setiap hari dengan bahan-bahan pilihan.</p>
                            </div>

                            <div>
                                <h3 className="text-xl font-bold serif-font text-secondary-accent mb-4">Link Cepat</h3>
                                <ul className="space-y-2 text-sm">
                                    <li><a href="#produk" className="hover:text-secondary-accent transition">Produk</a></li>
                                    <li><a href="#testimoni" className="hover:text-secondary-accent transition">Testimoni</a></li>
                                </ul>
                            </div>

                            <div>
                                <h3 className="text-xl font-bold serif-font text-secondary-accent mb-4">Hubungi Kami</h3>
                                <ul className="space-y-2 text-sm">
                                    <li className="flex items-center gap-2"><Icons.Phone /> <a href={`https://wa.me/${WHATSAPP_NUMBER}`} target="_blank" rel="noopener noreferrer" className="hover:text-secondary-accent transition">WhatsApp: +62 {WHATSAPP_NUMBER}</a></li>
                                    <li className="flex items-center gap-2"><Icons.Instagram /> <a href="https://instagram.com/kitchenfood_putri" target="_blank" rel="noopener noreferrer" className="hover:text-secondary-accent transition">Instagram: @kitchenfood_putri</a></li>
                                </ul>
                            </div>
                        </div>
                        
                        <div className="text-center text-sm text-F8F4E1/60">
                            &copy; {new Date().getFullYear()} Kitchen Food by Putri. | User ID Anda: {userId || 'Authenticating...'}
                        </div>
                    </div>
                </footer>
            );
        }

        // --- 5.6. Cart Side Panel ---
        function CartSidePanel({ isCartOpen, setIsCartOpen, cartItems, cartTotal, handleUpdateCart, handleClearCart, generateWhatsappMessage }) {
            return (
                <div 
                    className={`fixed inset-0 z-50 transition-opacity duration-300 ${isCartOpen ? 'opacity-100 visible' : 'opacity-0 hidden'}`}
                    onClick={() => setIsCartOpen(false)}
                >
                    <div className="absolute inset-0 bg-black/50"></div>
                    
                    <div 
                        className={`fixed right-0 top-0 h-full w-full max-w-md shadow-2xl transition-transform duration-300 transform ${isCartOpen ? 'translate-x-0' : 'translate-x-full'}`}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div className="flex flex-col h-full bg-stone-700">
                            
                            {/* Header */}
                            <div className="p-5 flex justify-between items-center cart-header-bg rounded-t-xl">
                                <h2 className="text-2xl font-bold serif-font text-secondary-accent">Keranjang Belanja</h2>
                                <button onClick={() => setIsCartOpen(false)} className="p-1 rounded-full text-F8F4E1 hover:bg-white/20 transition" aria-label="Tutup Keranjang">
                                    <Icons.X />
                                </button>
                            </div>

                            {/* Daftar Item */}
                            <div className="flex-1 overflow-y-auto p-5 cart-body-bg space-y-4">
                                {cartItems.length === 0 ? (
                                    <div className="text-center py-10 text-F8F4E1/80">
                                        <Icons.Cart />
                                        <p className="mt-3">Keranjang Anda kosong. Yuk, pilih brownies favorit!</p>
                                    </div>
                                ) : (
                                    cartItems.map(item => (
                                        <div key={item.id} className="flex items-center bg-stone-800 p-3 rounded-lg shadow-md">
                                            <div className="flex-1 min-w-0">
                                                <p className="font-semibold text-lg text-F8F4E1">{item.name}</p>
                                                <p className="text-sm text-D4AF98">{formatRupiah(item.price)}</p>
                                            </div>
                                            <div className="flex items-center space-x-2 ml-4">
                                                <button onClick={() => handleUpdateCart(item.id, item.quantity - 1)} className="p-1 rounded-full btn-primary hover:bg-FF69B4 text-4A2C2A transition" aria-label="Kurangi jumlah"><Icons.Minus /></button>
                                                <span className="font-bold w-6 text-center text-F8F4E1">{item.quantity}</span>
                                                <button onClick={() => handleUpdateCart(item.id, item.quantity + 1)} className="p-1 rounded-full btn-primary hover:bg-FF69B4 text-4A2C2A transition" aria-label="Tambah jumlah"><Icons.Plus /></button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                            
                            {/* Footer / Checkout */}
                            <div className="p-5 cart-footer-bg rounded-b-xl border-t-2">
                                <div className="flex justify-between items-center mb-4">
                                    <span className="text-xl font-semibold text-secondary-accent">Total:</span>
                                    <span className="text-2xl font-bold text-primary-accent">{formatRupiah(cartTotal)}</span>
                                </div>
                                
                                <a 
                                    href={generateWhatsappMessage()} 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className={`w-full py-3 rounded-xl font-bold text-lg transition flex items-center justify-center gap-2 shadow-lg ${cartItems.length === 0 ? 'bg-gray-400 cursor-not-allowed' : 'btn-whatsapp hover:bg-1EBE54'}`}
                                    onClick={cartItems.length > 0 ? handleClearCart : (e) => e.preventDefault()}
                                    disabled={cartItems.length === 0}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 12.83 12.83 0 0 1-2.73 3.66 12.82 12.82 0 0 1-3.66 2.73 8.38 8.38 0 0 1-3.8.9c-1.55 0-3-.3-4.36-.9s-2.61-1.42-3.66-2.73A12.83 12.83 0 0 1 2.3 15.3 8.38 8.38 0 0 1 1 11.5C1 6.25 5.25 2 10.5 2h3C18.75 2 23 6.25 23 11.5v3c0 .5-.4 1-1 1h-1.5c-.6 0-1-.4-1-1v-3.5c0-4.14-3.36-7.5-7.5-7.5h-3c-4.14 0-7.5 3.36-7.5 7.5S6.36 19 10.5 19H12c.5 0 1 .4 1 1s-.5 1-1 1H9c-.5 0-1 .4-1 1s.5 1 1 1h3c4.14 0 7.5-3.36 7.5-7.5v-3c0-.5-.4-1-1-1h-1.5c-.6 0-1-.4-1-1z"/></svg>
                                    {cartItems.length > 0 ? 'Checkout via WhatsApp' : 'Keranjang Kosong'}
                                </a>

                                <button
                                    onClick={handleClearCart}
                                    disabled={cartItems.length === 0}
                                    className={`w-full mt-2 py-2 rounded-xl text-sm font-semibold transition ${cartItems.length === 0 ? 'text-gray-500 cursor-not-allowed' : 'text-F8F4E1 hover:text-red-400'}`}
                                >
                                    Kosongkan Keranjang
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }


        // ===================================================================
        // 6. APLIKASI UTAMA (APP)
        // ===================================================================

        function App() {
            // State UI
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [cart, setCart] = useState({}); 
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [selectedImage, setSelectedImage] = useState(null); 
            const [imageAltText, setImageAltText] = useState('');
            
            // State Firebase
            const [db, setDb] = useState(null);
            const [userId, setUserId] = useState(null);
            const [testimonials, setTestimonials] = useState([]);
            const [loadingTesti, setLoadingTesti] = useState(true);

            // --- Handlers (Memoized) ---
            const handleViewImage = useCallback((url, alt) => {
                setSelectedImage(url);
                setImageAltText(alt);
            }, []);

            const handleAddToCart = useCallback((productId) => {
                setCart(prevCart => ({
                    ...prevCart,
                    [productId]: (prevCart[productId] || 0) + 1
                }));
            }, []); 

            const handleUpdateCart = useCallback((productId, quantity) => {
                setCart(prevCart => {
                    const newCart = { ...prevCart };
                    if (quantity <= 0) {
                        delete newCart[productId];
                    } else {
                        newCart[productId] = quantity;
                    }
                    return newCart;
                });
            }, []);

            const handleClearCart = useCallback(() => {
                setCart({});
                setIsCartOpen(false);
            }, []);

            // --- LOGIKA FIREBASE (AUTH & FETCHING DATA PUBLIK) ---
            // Ini adalah bagian KRITIS yang memastikan bug izin hilang.
            useEffect(() => {
                if (typeof window.firebase === 'undefined' || !window.firebase.initializeApp) return; 

                try {
                    const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
                    const app = window.firebase.initializeApp(firebaseConfig);
                    const firestore = window.firebase.getFirestore(app);
                    const authInstance = window.firebase.getAuth(app);
                    
                    setDb(firestore);
                    if (window.firebase.setLogLevel) window.firebase.setLogLevel('debug'); 

                    // 1. Inisiasi Auth
                    const initializeAuth = async () => {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await window.firebase.signInWithCustomToken(authInstance, __initial_auth_token);
                            } else {
                                await window.firebase.signInAnonymously(authInstance);
                            }
                        } catch (e) {
                            console.error("Firebase Auth Error:", e);
                        }
                    };
                    
                    let unsubscribeSnapshot = () => {}; 

                    // 2. Listener Auth State
                    const unsubscribeAuth = window.firebase.onAuthStateChanged(authInstance, (user) => {
                        unsubscribeSnapshot(); 
                        setLoadingTesti(true); 

                        if (user) {
                            setUserId(user.uid);
                            
                            // Ambil Testimoni HANYA setelah Auth Sukses
                            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                            const collectionPath = `artifacts/${appId}/public/data/testimonials`;
                            
                            const q = window.firebase.query(
                                window.firebase.collection(firestore, collectionPath)
                            );
                            
                            unsubscribeSnapshot = window.firebase.onSnapshot(q, (snapshot) => {
                                const loadedTestimonials = snapshot.docs.map(doc => ({
                                    id: doc.id,
                                    ...doc.data()
                                }));
                                
                                const sortedTestimonials = loadedTestimonials.sort((a, b) => {
                                    const timeA = a.createdAt && typeof a.createdAt.toDate === 'function' ? a.createdAt.toDate().getTime() : 0;
                                    const timeB = b.createdAt && typeof b.createdAt.toDate === 'function' ? b.createdAt.toDate().getTime() : 0;
                                    return timeB - timeA; // Newest first
                                });
                                
                                setTestimonials(sortedTestimonials);
                                setLoadingTesti(false);
                            }, (error) => {
                                console.error("Error fetching testimonials: ", error); // Ini adalah error yang hilang
                                setLoadingTesti(false);
                            });

                        } else {
                            setUserId(null); 
                            setTestimonials([]); 
                            setLoadingTesti(false);
                        }
                    });

                    initializeAuth(); 
                    
                    return () => {
                        unsubscribeAuth();
                        unsubscribeSnapshot(); 
                    };

                } catch (e) {
                    console.error("Firebase Initialization Error:", e);
                    setLoadingTesti(false);
                }
            }, []);

            // --- Logika Keranjang (Memoized) ---
            const cartItems = useMemo(() => {
                return Object.keys(cart)
                    .filter(productId => cart[productId] > 0)
                    .map(productId => {
                        const product = products.find(p => p.id === parseInt(productId));
                        return {
                            ...product,
                            quantity: cart[productId],
                            subtotal: product.price * cart[productId]
                        };
                    });
            }, [cart]);

            const cartTotal = useMemo(() => {
                return cartItems.reduce((total, item) => total + item.subtotal, 0);
            }, [cartItems]);

            const generateWhatsappMessage = () => {
                const itemDetails = cartItems.map(item => 
                    `* ${item.name} (${item.quantity} pcs) - ${formatRupiah(item.subtotal)}`
                ).join('\n');

                const message = encodeURIComponent(
                    `Halo Kitchen Food by Putri!\n\nSaya ingin memesan brownies dengan detail sebagai berikut:\n\n` + 
                    `--- Daftar Pesanan ---\n` +
                    `${itemDetails}\n\n` +
                    `*Total Belanja:* ${formatRupiah(cartTotal)}\n` +
                    `----------------------\n\n` +
                    `Mohon diproses, terima kasih!`
                );
                
                return `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
            };


            return (
                <div className="min-h-screen">
                    {/* 1. Header dan Navigasi */}
                    <Header 
                        isMenuOpen={isMenuOpen} 
                        setIsMenuOpen={setIsMenuOpen} 
                        isCartOpen={isCartOpen} 
                        setIsCartOpen={setIsCartOpen}
                        cart={cart}
                    />

                    <main>
                        {/* 2. Hero Section */}
                        <Hero />

                        {/* 3. Produk Section */}
                        <ProductsSection 
                            handleAddToCart={handleAddToCart}
                            handleViewImage={handleViewImage}
                        />

                        {/* 4. Testimoni Section */}
                        <TestimonialsSection 
                            testimonials={testimonials}
                            loadingTesti={loadingTesti}
                            db={db}
                            userId={userId}
                            handleViewImage={handleViewImage}
                        />
                    </main>

                    {/* 5. Footer */}
                    <ContactFooter userId={userId} />

                    {/* 6. Keranjang Side Panel */}
                    <CartSidePanel 
                        isCartOpen={isCartOpen}
                        setIsCartOpen={setIsCartOpen}
                        cartItems={cartItems}
                        cartTotal={cartTotal}
                        handleUpdateCart={handleUpdateCart}
                        handleClearCart={handleClearCart}
                        generateWhatsappMessage={generateWhatsappMessage}
                    />

                    {/* 7. Modal Gambar */}
                    <ImageModal 
                        imageUrl={selectedImage} 
                        onClose={() => setSelectedImage(null)}
                        altText={imageAltText}
                    />
                </div>
            );
        }

        // --- RENDER APLIKASI ---
        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
    </script>
</body>
</html>
